name: 歌单轮换

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      pick_count:
        description: '推几首歌'
        required: false
        default: ''
        type: string
  push:
    branches: [main]
    paths:
      - 'config.json'

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pycryptodomex
      - name: 执行轮换
        env:
          MUSIC_U: ${{ secrets.MUSIC_U }}
          PLAYLIST_ID: ${{ secrets.PLAYLIST_ID }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
          PICK_COUNT: ${{ inputs.pick_count || '' }}
        run: python rotate.py
